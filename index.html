<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=0.1">
  <title>Modern AI Resume Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card form-card">
      <h2>AI Resume Builder</h2>
      <form id="resumeForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="phone" placeholder="Phone" required>
        <textarea id="education" placeholder="Education" required></textarea>
        <textarea id="experience" placeholder="Experience" required></textarea>
        <textarea id="skills" placeholder="Skills(comma separated)" required></textarea>
        <button type="submit">Generate Resume</button>
      </form>
    </div>
    <div class="card preview-card">
      <h2>Resume Preview</h2>
      <div id="resumePreview">
        <p>Your generated resume will appear here...</p>
      </div>
    </div>
  </div>
</body>
</html>
